<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Briefing Agent</title>
    <meta http-equiv="refresh" content="2;url=https://multi-agent-orchestrator.onrender.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            backdrop-filter: blur(16px);
            max-width: 420px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #4f8ef7;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p {
            opacity: 0.7;
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
        }

        a {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            background: #4f8ef7;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>🌅 Daily Briefing Agent</h2>
        <p>Redirecting to the application...</p>
        <a href="https://multi-agent-orchestrator.onrender.com">Open Now →</a>
    </div>
    <script>
        setTimeout(() => {
            window.location.href = 'https://multi-agent-orchestrator.onrender.com';
        }, 2000);
    </script>
</body>

</html>
